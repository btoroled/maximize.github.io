<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Herramienta digital de cartas de fototerapia" />
  <title>Fototerapia — Cartas</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- Mobile sidebar toggle -->
  <button id="sidebar-toggle" title="Menú" aria-label="Abrir menú">☰</button>

  <div id="app">

    <!-- ═══ SIDEBAR ═══ -->
    <aside id="sidebar">

      <div class="sidebar-header">
        <h1><em>Foto</em>terapia</h1>
      </div>

      <!-- Deck selector -->
      <div class="sidebar-section">
        <p class="section-label">Mazo</p>
        <div id="deck-selector"></div>
      </div>

      <!-- Mode selector -->
      <div class="sidebar-section">
        <p class="section-label">Modo de uso</p>
        <div class="mode-toggle">
          <button data-mode="flip" class="active">🂠 Voltear</button>
          <button data-mode="select">🔍 Seleccionar</button>
        </div>
      </div>

      <!-- Preset selector -->
      <div class="sidebar-section">
        <p class="section-label">Disposición</p>
        <div id="preset-selector">
          <!-- preset-btn's inserted by JS -->

          <!-- Custom preset -->
          <details class="custom-preset-row">
            <summary>+ Personalizado</summary>
            <div class="custom-inputs">
              <label>
                Filas (1–9)
                <input type="number" id="custom-rows" min="1" max="9" value="3" />
              </label>
              <label>
                Columnas (1–9)
                <input type="number" id="custom-cols" min="1" max="9" value="4" />
              </label>
              <label class="custom-name-row">
                Nombre (para guardar)
                <input type="text" id="custom-name" placeholder="Ej: Sesión individual" />
              </label>
              <div class="custom-btn-row">
                <button id="custom-apply">Aplicar</button>
                <button id="custom-save">Guardar</button>
              </div>
            </div>
          </details>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="action-buttons">
        <button id="btn-reset" class="action-btn" title="Resetear tablero">
          ↺ Reset
        </button>
        <button id="btn-fullscreen" class="action-btn" title="Pantalla completa">
          <span class="fs-icon">⛶</span> Pantalla
        </button>
      </div>

    </aside>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main id="main-content">
      <div id="board-area">
        <div id="board"></div>
      </div>
    </main>

  </div>

  <!-- ═══ MODAL: Card Selector ═══ -->
  <div id="card-selector-modal" role="dialog" aria-modal="true" aria-label="Seleccionar carta">
    <div class="modal-panel">
      <div class="modal-header">
        <h2>Elegir carta</h2>
        <button id="modal-close" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-cards-grid"></div>
    </div>
  </div>

  <!-- ═══ CONFIRM DIALOG ═══ -->
  <div id="confirm-dialog" role="dialog" aria-modal="true">
    <div class="dialog-box">
      <p>¿Resetear el tablero?</p>
      <div class="dialog-actions">
        <button id="confirm-yes">Sí, resetear</button>
        <button id="confirm-no">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- ═══ TOAST ═══ -->
  <div id="toast" role="status" aria-live="polite"></div>

  <!-- Scripts -->
  <script src="js/decks.js"></script>
  <script src="js/state.js"></script>
  <script src="js/board.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/main.js"></script>

  <script>
    // Mobile sidebar toggle
    const sidebarToggle = document.getElementById("sidebar-toggle");
    const sidebar = document.getElementById("sidebar");
    sidebarToggle.addEventListener("click", () => {
      sidebar.classList.toggle("open");
    });
  </script>

</body>
</html>
